server:
  # Listen only on localhost for Pi-hole
  interface: 127.0.0.1
  port: 5335

  # Protocol support
  do-ip4: yes
  do-ip6: no
  do-udp: yes
  do-tcp: yes
  prefer-ip6: no

  # Security and hardening
  harden-glue: yes
  harden-dnssec-stripped: yes
  qname-minimisation: yes
  aggressive-nsec: yes
  hide-identity: yes
  hide-version: yes
  use-caps-for-id: no

  # Performance optimizations
  prefetch: yes
  num-threads: 1
  so-rcvbuf: 1m
  edns-buffer-size: 1232
  cache-min-ttl: 0
  cache-max-ttl: 86400
  msg-cache-size: 32m
  rrset-cache-size: 64m

  # Logging (quiet by default)
  verbosity: 0

  # Prevent RFC1918 leakage (important for AD labs)
  private-address: 10.0.0.0/8
  private-address: 172.16.0.0/12
  private-address: 192.168.0.0/16
  private-address: 169.254.0.0/16
  private-address: fd00::/8
  private-address: fe80::/10

# Forward all queries using DNS-over-TLS
forward-zone:
  name: "."
  forward-tls-upstream: yes
  forward-addr: 1.1.1.1@853
  forward-addr: 9.9.9.9@853
